<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

  <!-- Clean off-white background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#FAFCFF"/>

  <!-- ── BIRD ── single ink color #2563EB ── -->

  <!-- Body: one confident wobbly oval -->
  <path d="M 645 442
           C 652 358, 582 284, 496 286
           C 410 288, 326 354, 324 452
           C 322 550, 394 598, 508 596
           C 622 594, 648 526, 645 442 Z"
        fill="none" stroke="#2563EB" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head: small circle upper-right, overlapping body shoulder -->
  <path d="M 694 314
           C 694 368, 652 408, 600 408
           C 548 408, 506 368, 506 314
           C 506 260, 548 220, 600 220
           C 652 220, 694 260, 694 314 Z"
        fill="none" stroke="#2563EB" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wing: single loose arc across the body -->
  <path d="M 352 438 C 392 388, 458 364, 526 380"
        fill="none" stroke="#2563EB" stroke-width="9"
        stroke-linecap="round"/>

  <!-- Tail: two diverging strokes from the left -->
  <path d="M 326 455 C 244 436, 182 390, 154 332"
        fill="none" stroke="#2563EB" stroke-width="10"
        stroke-linecap="round"/>
  <path d="M 326 492 C 240 478, 172 436, 140 374"
        fill="none" stroke="#2563EB" stroke-width="8"
        stroke-linecap="round"/>

  <!-- Beak: two short open strokes (singing) -->
  <path d="M 692 302 L 778 274"
        fill="none" stroke="#2563EB" stroke-width="9"
        stroke-linecap="round"/>
  <path d="M 692 328 L 774 346"
        fill="none" stroke="#2563EB" stroke-width="9"
        stroke-linecap="round"/>

  <!-- Eye: single filled dot -->
  <circle cx="638" cy="296" r="14" fill="#2563EB"/>

  <!-- ── "Pa1" — bold italic, same blue ── -->
  <text x="512" y="766"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Georgia', serif"
        font-size="140" font-weight="bold" font-style="italic"
        fill="#2563EB" text-anchor="middle" letter-spacing="-2">Pa1</text>

</svg>
