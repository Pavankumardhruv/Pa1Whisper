<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="1024" height="512" rx="224" ry="224" fill="url(#glow)"/>

  <!-- Speech waveform bars — symmetrical, flowing -->
  <g transform="translate(512, 512)">
    <!-- Center bar (tallest) -->
    <rect x="-12" y="-120" width="24" height="240" rx="12" fill="url(#wave)" opacity="0.95"/>

    <!-- ±1 -->
    <rect x="-60" y="-90" width="20" height="180" rx="10" fill="url(#wave)" opacity="0.9"/>
    <rect x="40" y="-90" width="20" height="180" rx="10" fill="url(#wave)" opacity="0.9"/>

    <!-- ±2 -->
    <rect x="-108" y="-130" width="20" height="260" rx="10" fill="url(#wave)" opacity="0.85"/>
    <rect x="88" y="-130" width="20" height="260" rx="10" fill="url(#wave)" opacity="0.85"/>

    <!-- ±3 -->
    <rect x="-156" y="-70" width="18" height="140" rx="9" fill="url(#wave)" opacity="0.75"/>
    <rect x="138" y="-70" width="18" height="140" rx="9" fill="url(#wave)" opacity="0.75"/>

    <!-- ±4 -->
    <rect x="-202" y="-100" width="18" height="200" rx="9" fill="url(#wave)" opacity="0.65"/>
    <rect x="184" y="-100" width="18" height="200" rx="9" fill="url(#wave)" opacity="0.65"/>

    <!-- ±5 -->
    <rect x="-246" y="-50" width="16" height="100" rx="8" fill="url(#wave)" opacity="0.5"/>
    <rect x="230" y="-50" width="16" height="100" rx="8" fill="url(#wave)" opacity="0.5"/>

    <!-- ±6 (fading edges) -->
    <rect x="-288" y="-34" width="14" height="68" rx="7" fill="url(#wave)" opacity="0.35"/>
    <rect x="274" y="-34" width="14" height="68" rx="7" fill="url(#wave)" opacity="0.35"/>

    <!-- ±7 -->
    <rect x="-326" y="-20" width="12" height="40" rx="6" fill="url(#wave)" opacity="0.2"/>
    <rect x="314" y="-20" width="12" height="40" rx="6" fill="url(#wave)" opacity="0.2"/>
  </g>
</svg>
